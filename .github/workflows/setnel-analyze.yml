name: setnel-analyze
# Phase 3 — smarter detection. Every 30 min: adaptive baseline anomaly
# detection over the metric time-series (per-metric z-scores), then compound
# rules over active incidents (correlated conditions → escalation).

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: setnel-analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run analysis pass
        run: |
          code=$(curl -s -o /tmp/out.json -w '%{http_code}' --max-time 120 \
            "https://setnel.datumlab.xyz/api/v1/analyze?key=${{ secrets.SETNEL_CRON_SECRET }}")
          echo "status: $code"
          cat /tmp/out.json
          test "$code" = "200"
