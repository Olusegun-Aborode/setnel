name: monitor-check
# Runs every 15 minutes. Hits each dashboard, compares to the last snapshot,
# and fires Telegram alerts on breaches or technical breakdowns.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: monitor-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run check
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 25s is generous enough to absorb Vercel cold-start spin-ups
          # (we observed 12-18s in real flaps) without masking real outages.
          REQUEST_TIMEOUT_MS: '25000'
          # Email is digest-only; those secrets are intentionally absent here.
        run: npm run check
