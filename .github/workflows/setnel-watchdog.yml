name: setnel-watchdog
# Dead-man's-switch for Setnel. Every 15 min, checks the Hub's status endpoint
# and pings Telegram directly if Setnel itself has gone quiet, the Hub is
# unreachable, or alerts are stuck in the dead-letter. This is the only thing
# that catches "the monitoring stopped and nobody noticed".
#
# Deliberately dependency-free (plain node + global fetch) so it can't fail for
# the same reasons it's watching for.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: setnel-watchdog
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run watchdog
        env:
          SETNEL_STATUS_URL: https://setnel.datumlab.xyz/api/v1/status
          SETNEL_STALE_MIN: '20'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/watchdog.mjs
