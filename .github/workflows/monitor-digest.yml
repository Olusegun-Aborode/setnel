name: monitor-digest
# Runs every 12 hours (00:00 and 12:00 UTC). Builds a full report covering:
#  - Current values for every metric across every dashboard
#  - Data-insight alerts fired in the last 12h (also pushed to TG immediately)
#  - Technical alerts batched up since the last digest (TG never sees these)
# Sends the report to email; the TG mirror posts the same content as a summary.

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch: {}

concurrency:
  group: monitor-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run digest
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: npm run digest
