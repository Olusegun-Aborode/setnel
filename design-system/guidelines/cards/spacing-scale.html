<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base grid — space-1 through space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-card); }
  .row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
  .tok { width: 74px; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
  .px { width: 40px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align: right; }
  .bar { height: 14px; background: var(--ink); border-radius: 3px; }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-1</span><span class="px">4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="tok">space-2</span><span class="px">8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="tok">space-3</span><span class="px">12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="tok">space-4</span><span class="px">16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="tok">space-6</span><span class="px">24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="tok">space-8</span><span class="px">32</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="tok">space-12</span><span class="px">48</span><span class="bar" style="width:48px"></span></div>
</body>
</html>
