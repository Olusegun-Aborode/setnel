<!-- @dsCard group="Components" viewport="700x520" name="Data & Metrics" subtitle="StatCard · Panel · HeatStrip · Sparkline · MetricCard · CoverageTable" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--panel-2); }
  .grid { display: flex; flex-direction: column; gap: 16px; }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .matrix-row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
  .m-name { width: 130px; font-size: 13px; color: var(--ink); display: flex; align-items: center; gap: 8px; }
  .m-last { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
  <div class="grid" id="root"></div>

  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    const { StatCard, Panel, HeatStrip, MetricCard, CoverageTable } = window.SetnelDesignSystem_525d6e;
    const wave = Array.from({ length: 40 }, (_, i) => 50 + Math.sin(i / 3) * 12 + (i > 32 ? (i - 32) * 5 : 0));
    const mean = 52, sd = 9;

    function Demo() {
      return (
        <>
          <div className="kpis">
            <StatCard label="Dashboards" value="20" sub="monitored" />
            <StatCard label="Collecting today" value="18/20" sub="checked in" tone="warn" />
            <StatCard label="Healthy" value="20/20" sub="< 24h" tone="good" />
            <StatCard label="Active incidents" value="3" sub="open now" tone="bad" />
          </div>

          <Panel title="Dashboard health" note="14 days · target ~288/day" flush>
            <div style={{ padding: '10px 18px 14px' }}>
              {[
                ['Aave v3', 'healthy', '3m ago', [3,3,3,2,3,3,3,3,2,3,3,3,3,3]],
                ['Sui Lending', 'stale', '31h ago', [2,2,1,2,2,0,1,2,2,1,2,2,1,0]],
                ['Stablecoin Wars', 'down', '2d ago', [1,1,0,0,1,0,0,0,1,0,0,0,0,0]],
              ].map(([name, st, last, lv]) => (
                <div className="matrix-row" key={name}>
                  <span className="m-name"><span style={{width:8,height:8,borderRadius:8,background:`var(--status-${st})`}}></span>{name}</span>
                  <HeatStrip levels={lv} />
                  <span className="m-last">{last}</span>
                </div>
              ))}
            </div>
          </Panel>

          <Panel title="Metrics" note="grey band = normal range (mean ±2σ)">
            <div className="mgrid">
              <MetricCard metricKey="aave.v3.utilization" value="81.2%" points={wave} mean={mean} sd={sd} foot="Aave v3 · 40 samples" />
              <MetricCard metricKey="sui.tvl_total" value="$42.7M" points={wave.map((v,i)=>60 - Math.sin(i/4)*8)} mean={56} sd={7} foot="Sui Lending · 40 samples" />
            </div>
          </Panel>

          <Panel title="Coverage map" note="risk × protocol">
            <CoverageTable
              protocols={['Aave v3', 'Sui Lending', 'SparkLend']}
              rows={[
                { risk: 'Utilization spike', cells: ['yes', 'yes', 'planned'] },
                { risk: 'Oracle deviation', cells: ['yes', 'blocked', 'na'] },
                { risk: 'Bad debt / underwater', cells: ['blocked', 'na', 'blocked'] },
              ]}
            />
          </Panel>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
