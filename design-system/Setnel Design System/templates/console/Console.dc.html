<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Console" description="Setnel monitoring console — app shell with sidebar nav, KPI strip, dashboard-health matrix, and incident feed, built from the design system's own components" -->
<helmet>
  <script src="./ds-base.js"></script>
</helmet>
<div style="display:flex; height:100vh; overflow:hidden; background:#fff; font-family:var(--font-sans); color:var(--ink)">

  <!-- Sidebar -->
  <aside style="width:216px; flex:none; display:flex; flex-direction:column; background:var(--sidebar-bg); border-right:1px solid var(--border)">
    <div style="display:flex; align-items:center; gap:9px; padding:14px 14px 10px">
      <img src="../../assets/logo.png" width="26" height="26" style="border-radius:6px; display:block" alt="Datum Labs" />
      <div style="line-height:1">
        <div style="font-size:15px; font-weight:700; letter-spacing:-0.02em; color:var(--ink)">Setnel</div>
        <div style="font-size:10.5px; color:var(--muted); margin-top:3px">Datum Labs</div>
      </div>
    </div>
    <nav style="flex:1; overflow-y:auto; padding:6px 8px; display:flex; flex-direction:column; gap:3px">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--faint); padding:8px 9px 3px; font-weight:600">Monitor</div>
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.NavItem" label="Console" active="{{ true }}" hint-size="100%,34px"></x-import>
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.NavItem" label="Incidents" count="3" hint-size="100%,34px"></x-import>
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--faint); padding:12px 9px 3px; font-weight:600">Analyze</div>
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.NavItem" label="Metrics" hint-size="100%,34px"></x-import>
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.NavItem" label="Coverage" hint-size="100%,34px"></x-import>
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.NavItem" label="Backtest" hint-size="100%,34px"></x-import>
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--faint); padding:12px 9px 3px; font-weight:600">Respond</div>
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.NavItem" label="Runbooks" hint-size="100%,34px"></x-import>
    </nav>
    <div style="border-top:1px solid var(--border); padding:10px 12px">
      <x-import component-from-global-scope="SetnelDesignSystem_525d6e.LiveIndicator" live="{{ true }}" seconds="12" hint-size="110px,32px"></x-import>
    </div>
  </aside>

  <!-- Content -->
  <div style="flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden">
    <header style="display:flex; align-items:center; justify-content:space-between; height:52px; padding:0 22px; border-bottom:1px solid var(--border); flex:none">
      <div>
        <div style="font-size:22px; font-weight:600; letter-spacing:-0.01em; color:var(--ink); line-height:1.1">Console</div>
        <div style="font-size:12px; color:var(--muted); margin-top:2px">Live risk overview across all monitored dashboards</div>
      </div>
    </header>

    <main style="flex:1; overflow-y:auto">
      <div style="max-width:1280px; margin:0 auto; padding:20px 22px 60px; display:flex; flex-direction:column; gap:16px">

        <!-- KPI strip -->
        <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:12px">
          <x-import component-from-global-scope="SetnelDesignSystem_525d6e.StatCard" label="Dashboards" value="20" sub="monitored" hint-size="100%,88px"></x-import>
          <x-import component-from-global-scope="SetnelDesignSystem_525d6e.StatCard" label="Collecting today" value="18/20" sub="checked in" tone="warn" hint-size="100%,88px"></x-import>
          <x-import component-from-global-scope="SetnelDesignSystem_525d6e.StatCard" label="Healthy" value="20/20" sub="&lt; 24h since last check" tone="good" hint-size="100%,88px"></x-import>
          <x-import component-from-global-scope="SetnelDesignSystem_525d6e.StatCard" label="Active incidents" value="3" sub="open now" tone="warn" hint-size="100%,88px"></x-import>
          <x-import component-from-global-scope="SetnelDesignSystem_525d6e.StatCard" label="Critical" value="1" sub="active" tone="bad" hint-size="100%,88px"></x-import>
        </div>

        <!-- Dashboard health -->
        <x-import component-from-global-scope="SetnelDesignSystem_525d6e.Panel" title="Dashboard health" note="Last 14 days · target ~288/day" divided="{{ true }}" flush="{{ true }}" hint-size="100%,220px">
          <div style="padding:14px 18px 16px">
            <sc-for list="{{ dashboards }}" as="d" hint-placeholder-count="4">
              <div style="display:grid; grid-template-columns:200px 1fr 92px; gap:14px; align-items:center; padding:7px 0; border-top:1px solid var(--border)">
                <span style="display:flex; align-items:center; gap:9px; font-size:13px; font-weight:550; color:var(--ink)">
                  <x-import component-from-global-scope="SetnelDesignSystem_525d6e.StatusDot" status="{{ d.status }}" hint-size="16px,16px"></x-import>
                  {{ d.name }}
                </span>
                <x-import component-from-global-scope="SetnelDesignSystem_525d6e.HeatStrip" levels="{{ d.heat }}" hint-size="220px,14px"></x-import>
                <span style="font-family:var(--font-mono); font-size:12.5px; color:var(--muted); text-align:right">{{ d.last }}</span>
              </div>
            </sc-for>
          </div>
        </x-import>

        <!-- Incidents -->
        <x-import component-from-global-scope="SetnelDesignSystem_525d6e.Panel" title="Incidents" note="3 active" divided="{{ true }}" flush="{{ true }}" hint-size="100%,260px">
          <div style="padding:16px 18px 18px; display:flex; flex-direction:column; gap:8px">
            <sc-for list="{{ incidents }}" as="i" hint-placeholder-count="3">
              <div style="border:1px solid var(--border); border-radius:8px; padding:12px 14px">
                <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:5px">
                  <span style="font-size:13px; font-weight:600; color:var(--ink)">{{ i.dashboard }}</span>
                  <x-import component-from-global-scope="SetnelDesignSystem_525d6e.Badge" variant="{{ i.severity }}" hint-size="60px,18px">{{ i.severity }}</x-import>
                  <x-import component-from-global-scope="SetnelDesignSystem_525d6e.Badge" variant="exposure" hint-size="90px,18px">{{ i.exposure }}</x-import>
                </div>
                <div style="font-size:14px; line-height:1.45; color:var(--ink-2)">{{ i.message }}</div>
                <div style="font-family:var(--font-mono); font-size:12px; color:var(--faint); margin-top:6px">{{ i.detector }} · {{ i.last }}</div>
              </div>
            </sc-for>
          </div>
        </x-import>

      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      dashboards: [
        { name: 'Aave v3',         status: 'healthy', last: '3m ago',  heat: [3,3,3,2,3,3,3,3,2,3,3,3,3,3] },
        { name: 'Sui Lending',     status: 'stale',   last: '31h ago', heat: [2,2,1,2,2,0,1,2,2,1,2,2,1,0] },
        { name: 'Stablecoin Wars', status: 'down',    last: '2d ago',  heat: [1,1,0,0,1,0,0,0,1,0,0,0,0,0] },
        { name: 'Multichain TVL',  status: 'healthy', last: '5m ago',  heat: [3,3,2,3,3,3,3,2,3,3,3,3,2,3] },
      ],
      incidents: [
        { dashboard: 'Stablecoin Wars', severity: 'emergency', exposure: '—',
          message: 'Collection stalled — no samples ingested in 2d 4h against a ~5-min cadence.',
          detector: 'ingest.collection_stalled', last: '11m ago' },
        { dashboard: 'Aave v3', severity: 'critical', exposure: '$1.2B at risk',
          message: 'USDC utilization spiked to 94.2% — 8.1pt above its 30-day mean in under 20 minutes.',
          detector: 'aave.v3.utilization_spike', last: '4m ago' },
        { dashboard: 'Sui Lending', severity: 'warning', exposure: '$42.7M at risk',
          message: 'suiUSDT supply concentration (HHI) drifted to 3,140 — top wallet now 38% of supply.',
          detector: 'sui.concentration_hhi', last: '52m ago' },
      ],
    };
  }
}
</script>
</body>
</html>
