<!-- @dsCard group="Type" viewport="700x210" name="Mono & Data" subtitle="Geist Mono — metrics, detector IDs, timestamps, tabular figures" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1px solid var(--border-hairline); }
  .r:last-child { border-bottom: none; }
  .meta { width: 116px; flex: none; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .metric { font: var(--weight-semibold) 26px/1.1 var(--font-mono); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; color: var(--text-primary); }
  .metric small { font-size: 14px; color: var(--text-muted); font-weight: 400; }
  .id { font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); }
  .ts { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="r"><span class="meta">metric · 26 / 600</span><span class="metric">$1.24<small>B</small> <small>at risk</small></span></div>
  <div class="r"><span class="meta">detector id · 13</span><span class="id">aave.v3.utilization_spike</span></div>
  <div class="r"><span class="meta">metric key · 13</span><span class="id">sui.tvl_total · 42.7% util</span></div>
  <div class="r"><span class="meta">timestamp · 12</span><span class="ts">Jul 05 · 14:32 · 3m ago</span></div>
</body>
</html>
