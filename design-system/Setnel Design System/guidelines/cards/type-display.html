<!-- @dsCard group="Type" viewport="700x220" name="Display & Titles" subtitle="Geist — page titles, section titles, panel headings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-card); }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 7px 0; border-bottom: 1px solid var(--border-hairline); }
  .r:last-child { border-bottom: none; }
  .meta { width: 108px; flex: none; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .s1 { font: var(--weight-semibold) 38px/1.1 var(--font-sans); letter-spacing: -0.02em; color: var(--text-primary); }
  .s2 { font: var(--weight-semibold) 30px/1.15 var(--font-sans); letter-spacing: -0.02em; }
  .s3 { font: var(--weight-semibold) 20px/1.3 var(--font-sans); letter-spacing: -0.01em; }
  .s4 { font: var(--weight-semibold) 17px/1.3 var(--font-sans); }
</style>
</head>
<body>
  <div class="r"><span class="meta">38 / 700</span><span class="s1">Active incidents</span></div>
  <div class="r"><span class="meta">30 / 600</span><span class="s2">Dashboard health</span></div>
  <div class="r"><span class="meta">20 / 600</span><span class="s3">Threshold backtest</span></div>
  <div class="r"><span class="meta">17 / 600</span><span class="s4">Runbook · Collection stalled</span></div>
</body>
</html>
