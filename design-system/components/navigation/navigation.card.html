<!-- @dsCard group="Components" viewport="700x430" name="App Shell · Sidebar & NavItem" subtitle="Persistent left rail introduced in the v2 rework" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--panel-2); }
  .frame { height: 388px; display: flex; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-panel); overflow: hidden; }
  .stub { flex: 1; padding: 20px; color: var(--faint); font-size: 13px; }
  .brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); line-height: 1; }
  .brand-sub { font-size: 10.5px; color: var(--muted); }
</style>
</head>
<body>
  <div class="frame">
    <div id="side"></div>
    <div class="stub">Content area · pair the sidebar with a scrolling <code>min-width:0</code> column.</div>
  </div>

  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    const { Sidebar, SidebarSection, NavItem, LiveIndicator } = window.SetnelDesignSystem_525d6e;
    const Ic = (n) => <i data-lucide={n}></i>;

    const brand = (
      <>
        <img src="../../assets/logo.png" width="26" height="26" style={{ borderRadius: 6 }} />
        <div><div className="brand-name">Setnel</div><div className="brand-sub">Datum Labs</div></div>
      </>
    );

    function Demo() {
      const [active, setActive] = React.useState('console');
      const item = (id, icon, label, extra) => (
        <NavItem icon={Ic(icon)} label={label} active={active === id} onClick={() => setActive(id)} {...extra} />
      );
      return (
        <Sidebar brand={brand} footer={<LiveIndicator live seconds={12} />}>
          <SidebarSection label="Monitor">
            {item('console', 'layout-dashboard', 'Console')}
            {item('incidents', 'siren', 'Incidents', { count: 3 })}
            {item('health', 'heart-pulse', 'Dashboard health')}
          </SidebarSection>
          <SidebarSection label="Analyze">
            {item('metrics', 'activity', 'Metrics')}
            {item('coverage', 'grid-3x3', 'Coverage', { dot: true })}
            {item('backtest', 'history', 'Backtest')}
          </SidebarSection>
          <SidebarSection label="Respond">
            {item('runbooks', 'book-open', 'Runbooks')}
          </SidebarSection>
        </Sidebar>
      );
    }
    ReactDOM.createRoot(document.getElementById('side')).render(<Demo />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
  </script>
</body>
</html>
