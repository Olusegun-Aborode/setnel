# ─────────────────────────────────────────────────────────────────────
#  Datum Labs dashboard monitor — v1 alert config
#
#  Every block below encodes one dashboard and the metrics to watch on it.
#  Thresholds are starting points — tune them in a PR once you have a week
#  of real data and you see where the noise lives.
#
#  Rule semantics (per metric):
#    percentChange: N   → fire if |Δ%| vs last snapshot (or vs windowHours ago) > N
#    absoluteMin:   N   → fire if value < N
#    absoluteMax:   N   → fire if value > N
#    windowHours:   N   → compare vs snapshot N hours ago instead of last run
#    critical:      true→ flag as critical in notifications (louder, exit-code 1)
#
#  Fill in each dashboard's `baseUrl` with the deployed URL (without trailing /).
# ─────────────────────────────────────────────────────────────────────

notifications:
  telegram:
    enabled: true
  email:
    enabled: true
    digestOnly: true   # email is only used for the 6h digest; TG handles urgent alerts

dashboards:
  # ───────────── Aave — lending, multi-chain v3/v4 ─────────────
  - id: aave
    name: Aave
    baseUrl: https://aave-dashboard.vercel.app
    healthPath: /api/health
    enabled: true
    metrics:
      - id: total_market_size
        label: TVL (market size)
        path: /api/aave/overview
        extract: totalMarketSize
        unit: usd
        alert:
          percentChange: 15
          critical: true
      - id: total_borrows
        label: Total borrows
        path: /api/aave/overview
        extract: totalBorrows
        unit: usd
        alert:
          percentChange: 20
      - id: total_available
        label: Available liquidity
        path: /api/aave/overview
        extract: totalAvailable
        unit: usd
        alert:
          percentChange: 25
      - id: protocol_revenue
        label: Protocol revenue (24h)
        path: /api/aave/overview
        extract: protocolRevenueUSD
        unit: usd
        alert:
          percentChange: 50    # revenue is volatile — wider band
      - id: liquidations_usd_recent
        label: Liquidations $ (recent page)
        path: /api/aave/liquidations?pageSize=50
        extract: aggregations.totalLiquidatedUSD
        unit: usd
        alert:
          percentChange: 100   # doubling in one window is signal, not noise
          critical: true
      - id: liquidations_count_recent
        label: Liquidations count (recent page)
        path: /api/aave/liquidations?pageSize=50
        extract: aggregations.totalCount
        unit: count
        alert:
          percentChange: 100

  # ───────────── Centrifuge — RWA pools ─────────────
  - id: centrifuge
    name: Centrifuge RWA
    baseUrl: https://datumlabs-centrifuge.vercel.app
    healthPath: /api/health
    enabled: true
    metrics:
      - id: total_tvl
        label: Total RWA TVL
        path: /api/overview
        extract: totals.tvlUsd
        unit: usd
        alert:
          percentChange: 10    # RWA TVL should move slowly; 10% = meaningful
          critical: true
      - id: active_pools
        label: Active pools
        path: /api/overview
        extract: totals.activePools
        unit: count
        alert:
          percentChange: 1     # pool count changes are rare → any change is news
      - id: net_flows_30d
        label: Net flows (30d)
        path: /api/overview
        extract: totals.netFlows30dUsd
        unit: usd
        alert:
          percentChange: 40
      - id: data_quality_broken
        label: Broken data-quality tokens
        path: /api/overview
        extract: dataQuality.summary.broken
        unit: count
        allowMissing: true
        alert:
          absoluteMax: 0       # any broken token fires
          critical: true
      - id: flow_deposits
        label: Deposits ($, flow window)
        path: /api/flow
        extract: totalDepositsUsd
        unit: usd
        alert:
          percentChange: 50
      - id: flow_redemptions
        label: Redemptions ($, flow window)
        path: /api/flow
        extract: totalRedemptionsUsd
        unit: usd
        alert:
          percentChange: 50
          critical: true       # redemption spikes → liquidity stress
      - id: unique_holders
        label: Unique holders
        path: /api/investors
        extract: totalUniqueAccounts
        unit: count
        alert:
          percentChange: 20

  # ───────────── Navi — Sui lending ─────────────
  # next.config.ts sets basePath: '/navi', so all routes are served under
  # /navi/api/*. healthPath and metric paths reflect that.
  - id: navi
    name: Navi Lending
    baseUrl: https://datumlabs-defi-dashboard.vercel.app
    healthPath: /navi/api/health
    enabled: true
    metrics:
      - id: total_supply
        label: Total supply
        path: /navi/api/pools
        extract: totals.totalSupplyUsd
        unit: usd
        alert:
          percentChange: 15
          critical: true
      - id: total_borrows
        label: Total borrows
        path: /navi/api/pools
        extract: totals.totalBorrowsUsd
        unit: usd
        alert:
          percentChange: 20
      - id: tvl
        label: TVL (available liquidity)
        path: /navi/api/pools
        extract: totals.tvl
        unit: usd
        alert:
          percentChange: 15
      # Per-pool utilization — one rule per major pool. Extract by array index;
      # pool order is deterministic from the SDK response. If the order changes,
      # swap the indices or expose a keyed endpoint. Add/remove rows as assets
      # are listed/delisted.
      - id: pool_0_utilization
        label: Pool #0 utilization
        path: /navi/api/pools
        extract: pools[0].utilization
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      - id: pool_1_utilization
        label: Pool #1 utilization
        path: /navi/api/pools
        extract: pools[1].utilization
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      - id: pool_2_utilization
        label: Pool #2 utilization
        path: /navi/api/pools
        extract: pools[2].utilization
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      # Liquidation count in recent page — spike = liquidation cascade.
      - id: liquidations_total
        label: Total liquidations indexed
        path: /navi/api/liquidations?limit=1
        extract: total
        unit: count
        alert:
          percentChange: 10    # any sudden jump in all-time count is a cascade

  # ───────────── defi-tvl — cross-protocol TVL benchmark ─────────────
  - id: defi_tvl
    name: DeFi TVL Benchmark
    baseUrl: https://defi-tvl-dashboard.vercel.app
    healthPath: /api/health
    enabled: true
    metrics:
      - id: total_tvl
        label: Total DeFi TVL (all protocols)
        path: /api/tvl
        extract: totalTvl
        unit: usd
        alert:
          percentChange: 10
          critical: true

  # ───────────── Liquidator economy — cross-protocol liquidation analytics ─────────────
  # Tracks liquidation events across Aave v3, Fluid, Morpho Blue, Spark.
  # No /api/health route — using "/" as a 200-check fallback.
  - id: liquidator_economy
    name: Liquidator Economy
    baseUrl: https://liquidator-economy-dashboard.vercel.app
    healthPath: /
    enabled: true
    metrics:
      - id: total_events
        label: Total liquidation events (lifetime)
        path: /api/overview
        extract: totals.totalEvents
        unit: count
        alert:
          # Count is monotonic — a +5% jump in 15 min means a *lot* of new
          # liquidations all at once = liquidation cascade.
          percentChange: 5
          critical: true
      - id: total_volume
        label: Total liquidated volume (lifetime)
        path: /api/overview
        extract: totals.totalVolume
        unit: usd
        alert:
          percentChange: 5
          critical: true
      - id: unique_liquidators
        label: Unique liquidators (lifetime)
        path: /api/overview
        extract: totals.uniqueLiquidators
        unit: count
        alert:
          percentChange: 10
      - id: latest_large_collateral
        label: Largest recent liquidation (collateral $)
        path: /api/overview
        extract: recentLarge[0].collateralAmountUsd
        unit: usd
        alert:
          # When a brand-new whale-tier liquidation lands at the top, this
          # value changes. Wide threshold — only the truly enormous ones.
          percentChange: 100
          critical: true

  # ───────────── Lending intelligence terminal — multi-protocol KPI dashboard ─────────────
  - id: lending_intel
    name: Lending Intelligence Terminal
    baseUrl: https://lending-intelligence-terminal.vercel.app
    healthPath: /
    enabled: true
    metrics:
      - id: total_tvl
        label: Total TVL (all protocols)
        path: /api/overview
        extract: snapshot.totalTvl
        unit: usd
        alert:
          percentChange: 10
          critical: true
      - id: total_borrowed
        label: Total borrowed
        path: /api/overview
        extract: snapshot.totalBorrowed
        unit: usd
        alert:
          percentChange: 15
      - id: total_supplied
        label: Total supplied
        path: /api/overview
        extract: snapshot.totalSupplied
        unit: usd
        alert:
          percentChange: 15
      - id: total_fees_24h
        label: Protocol fees (24h)
        path: /api/overview
        extract: snapshot.totalFees24h
        unit: usd
        alert:
          percentChange: 50
      - id: protocol_count
        label: Protocols tracked
        path: /api/overview
        extract: snapshot.protocolCount
        unit: count
        alert:
          # Any change = listing/delisting event. Worth a heads-up.
          percentChange: 1
      - id: stablecoin_debt_share
        label: Stablecoin debt share
        path: /api/overview
        extract: snapshot.stablecoinDebtSharePct
        unit: percent
        alert:
          percentChange: 10

  # ───────────── Spark Lend — per-asset risk monitor ─────────────
  # Returns a flat array of markets; we monitor utilization and frozen-status
  # on the major actives. Update indices when assets are added/delisted.
  # As of writing: [0]=DAI, [2]=USDC, [3]=WETH, [8]=USDT.
  # USDT is currently at 96% utilization — expect this to fire on first run.
  - id: sparklend
    name: Spark Lend
    baseUrl: https://sparklend-dashboard.vercel.app
    healthPath: /
    enabled: true
    metrics:
      - id: dai_utilization
        label: DAI utilization
        path: /api/markets
        extract: '[0].utilization'
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      - id: usdc_utilization
        label: USDC utilization
        path: /api/markets
        extract: '[2].utilization'
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      - id: weth_utilization
        label: WETH utilization
        path: /api/markets
        extract: '[3].utilization'
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      - id: usdt_utilization
        label: USDT utilization
        path: /api/markets
        extract: '[8].utilization'
        unit: percent
        allowMissing: true
        alert:
          absoluteMax: 90
          critical: true
      # Frozen status flips boolean → 1 when a market is frozen by governance.
      - id: dai_frozen
        label: DAI frozen status
        path: /api/markets
        extract: '[0].isFrozen'
        unit: count
        allowMissing: true
        alert:
          absoluteMax: 0
          critical: true
      - id: usdc_frozen
        label: USDC frozen status
        path: /api/markets
        extract: '[2].isFrozen'
        unit: count
        allowMissing: true
        alert:
          absoluteMax: 0
          critical: true
      - id: weth_frozen
        label: WETH frozen status
        path: /api/markets
        extract: '[3].isFrozen'
        unit: count
        allowMissing: true
        alert:
          absoluteMax: 0
          critical: true

  # ───────────── Sui Lending — basic uptime ─────────────
  # Has /api/health (already deployed) but no public data API endpoints.
  # Monitor only catches if the dashboard goes down.
  - id: sui_lending
    name: Sui Lending
    baseUrl: https://sui-lending.vercel.app
    healthPath: /api/health
    enabled: true
    metrics: []

  # ───────────── DuneUK Terminal — basic uptime ─────────────
  # No discovered API endpoints — homepage 200 = alive signal only.
  - id: duneuk
    name: DuneUK Terminal
    baseUrl: https://www.duneuk.com
    healthPath: /
    enabled: true
    metrics: []

  # ───────────── Moonwell — DISABLED, deployment broken ─────────────
  # Production URL https://moonwell-dashboard-kappa.vercel.app/ returns 404
  # and the bare project URL returns 402. Investigate / redeploy then re-enable.
  - id: moonwell
    name: Moonwell
    baseUrl: https://moonwell-dashboard-kappa.vercel.app
    healthPath: /
    enabled: false
    metrics: []
